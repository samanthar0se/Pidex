<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>Pidex</title>
  </head>
  <body>
    <main>
      <h1>Pidex Host</h1>
      <section id="pairing" hidden>
        <h2>Pair this Device</h2>
        <p>This Device gains the complete Pidex surface and the signed-in Windows user's Pi machine authority.</p>
        <button id="pair-device">Pair Device</button>
      </section>
      <dl id="status">
        <dt>Readiness</dt>
        <dd>connecting</dd>
      </dl>
      <button id="new-session">New Session</button>
      <section id="new-session-view" hidden>
        <h2>New Session</h2>
        <label>Project <select id="session-project"><option value="">Host-unscoped</option></select></label>
        <label>Workspace <select id="session-workspace"><option value="">No Workspace</option></select></label>
        <button id="create-session">Create empty Session</button>
        <button id="cancel-session">Cancel</button>
      </section>
      <nav id="sessions" aria-label="Sessions"></nav>
      <section id="pi-presentation" aria-live="polite">
        <h2 id="pi-title"></h2>
        <dl id="pi-status"></dl>
        <div id="pi-widgets"></div>
        <ul id="pi-notifications"></ul>
        <div id="pi-suggestions"></div>
      </section>
      <section aria-label="Run controls">
        <select id="run-model" hidden aria-label="Model"></select>
        <select id="run-mode" hidden aria-label="Mode"></select>
        <textarea id="run-input" disabled aria-label="Input"></textarea>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
